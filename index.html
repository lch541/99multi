<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#000000" />
  <title>99乘法 坐标爆破（iPad9 固定版·动态表头·列头无格）</title>
  

  <link rel="stylesheet" href="styles.css">
  <script src="app.js" defer></script>
</head>

<body>
  <div class="flash ok" id="flashOk"></div>
  <div class="flash bad" id="flashBad"></div>

  <div class="container">
    <div class="stage fit" id="stage">
      <div class="frame">
        <!-- LEFT -->
        <div class="leftCard">
          <div class="gridInner">
            <div class="matrixBox">
              <div class="guideV" id="guideV"></div>
              <div class="guideH" id="guideH"></div>
              <div class="matrix" id="matrix"></div>
            </div>
          </div>
        </div>

        <!-- RIGHT -->
        <div class="rightCard">
          <div class="sideInner">
            <div class="sec progress">
              <div class="label">progress</div>
              <div class="scoreText" id="scoreText">0/81</div>

			  <div class="iceCreamBox">
  <svg class="iceCreamSvg" viewBox="0 0 200 240" aria-label="ice cream">
    <defs>
      <linearGradient id="iceCreamGrad" x1="0%" y1="100%" x2="0%" y2="0%">
        <stop offset="0%" class="grad-stop" id="gradStop1" stop-color="#ffb6c1"/>
        <stop offset="100%" class="grad-stop" id="gradStop2" stop-color="#ffe4e1"/>
      </linearGradient>
      <clipPath id="iceCreamClip">
        <!-- 冰淇淋球 -->
        <ellipse cx="100" cy="75" rx="60" ry="55"/>
        <!-- 蛋筒 - 三角形 wafer -->
        <path d="M60 110 L100 210 L140 110 L130 110 C120 105 80 105 70 110 Z"/>
      </clipPath>
    </defs>
    <!-- 底图 - 灰色轮廓 -->
    <g clip-path="url(#iceCreamClip)" opacity="0.15">
      <rect x="0" y="0" width="200" height="240" fill="#666"/>
    </g>
    <!-- 填充层 - 从下往上 -->
    <rect id="iceFill" x="0" y="240" width="200" height="0" fill="url(#iceCreamGrad)" clip-path="url(#iceCreamClip)" class="ice-fill-rect"/>
  </svg>
</div>
              <div class="progBar"><div class="progFill" id="progFill"></div></div>

            </div>

            <div class="sec time">
              <div class="label">time</div>
              <div class="timeBar"><div class="timeFill" id="timeFill"></div></div>
              <div class="timeDigital" id="timeDigital">00:10</div>
            </div>

            <div class="sec keypad">
              <div class="inputHint">input</div>
              <div class="inputValue" id="inputValue"> </div>
              <div class="keypadGrid" id="keypad"></div>
            </div>

          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 底部 -->
  <div class="footer">
    <a href="#" class="historyLink" onclick="showHistory(); return false;">历史记录</a>
  </div>

  <!-- 恭喜弹窗 -->
  <div class="popup" id="completePopup">
    <div class="popupContent">
      <div class="popupTitle">🎉 恭喜获得一个冰淇淋券！</div>
      <div class="popupStats" id="popupStats"></div>
      <button class="popupBtn" onclick="closePopup()">太棒了！</button>
    </div>
  </div>

  <!-- 进步弹窗 -->
  <div class="popup" id="进步Popup">
    <div class="popupContent best">
      <div class="popupTitle">🏆 又进步了！</div>
      <div class="popupStats" id="进步Stats"></div>
      <div class="iceRain" id="iceRain"></div>
      <button class="popupBtn" onclick="closeBestPopup()">继续加油！</button>
    </div>
  </div>

  <!-- 历史记录弹窗 -->
  <div class="popup" id="historyPopup">
    <div class="popupContent history">
      <div class="popupTitle">📊 练习历史</div>
      <div class="historyList" id="historyList"></div>
      <button class="popupBtn" onclick="closeHistory()">关闭</button>
    </div>
  </div>

</body>
</html>
