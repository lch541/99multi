<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#000000" />
  <title>99乘法 坐标爆破（iPad9 固定版·动态表头·列头无格）</title>
  

  <link rel="stylesheet" href="styles.css">
  <script src="app.js" defer></script>
</head>

<body>
  <div class="flash ok" id="flashOk"></div>
  <div class="flash bad" id="flashBad"></div>

  <div class="stage fit" id="stage">
    <div class="frame">
      <!-- LEFT -->
      <div class="leftCard">
        <div class="gridInner">
          <div class="matrixBox">
            <div class="guideV" id="guideV"></div>
            <div class="guideH" id="guideH"></div>
            <div class="matrix" id="matrix"></div>
          </div>
        </div>
      </div>

      <!-- RIGHT -->
      <div class="rightCard">
        <div class="sideInner">
          <div class="sec progress">
            <div class="label">progress</div>
            <div class="scoreText" id="scoreText">0/81</div>

			<div class="iceCreamBox">
  <svg class="iceCreamSvg" viewBox="0 0 200 240" aria-label="ice cream">
    <defs>
      <linearGradient id="iceCreamGrad" x1="0%" y1="100%" x2="0%" y2="0%">
        <stop offset="0%" class="grad-stop" id="gradStop1" stop-color="#ffb6c1"/>
        <stop offset="100%" class="grad-stop" id="gradStop2" stop-color="#ffe4e1"/>
      </linearGradient>
      <clipPath id="iceCreamClip">
        <!-- 冰淇淋形状 -->
        <path d="M100 20 C60 20 40 50 40 90 L40 180 C40 200 60 220 100 220 C140 220 160 200 160 180 L160 90 C160 50 140 20 100 20 Z"/>
        <!-- 甜筒 -->
        <path d="M60 180 L100 230 L140 180 L130 180 C130 170 120 165 100 165 C80 165 70 170 70 180 Z"/>
      </clipPath>
    </defs>
    <!-- 底图 - 灰色轮廓 -->
    <g clip-path="url(#iceCreamClip)" opacity="0.15">
      <rect x="0" y="0" width="200" height="240" fill="#666"/>
    </g>
    <!-- 填充层 - 从下往上 -->
    <rect id="iceFill" x="0" y="240" width="200" height="0" fill="url(#iceCreamGrad)" clip-path="url(#iceCreamClip)" class="ice-fill-rect"/>
  </svg>
</div>
            <div class="progBar"><div class="progFill" id="progFill"></div></div>

          </div>

          <div class="sec time">
            <div class="label">time</div>
            <div class="timeBar"><div class="timeFill" id="timeFill"></div></div>
            <div class="timeDigital" id="timeDigital">00:10</div>
          </div>

          <div class="sec keypad">
            <div class="inputHint">input</div>
            <div class="inputValue" id="inputValue"> </div>
            <div class="keypadGrid" id="keypad"></div>
          </div>


        </div>
      </div>
    </div>
  </div>


</body>
</html>
